<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logic Lords - Authentication</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="global.css">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .auth-container { background: #1e293b; padding: 40px; border-radius: 16px; border: 2px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 450px; width: 100%; text-align: center; max-height: 90vh; overflow-y: auto; position: relative;}
        .auth-container h1 { margin-top: 0; color: white; font-size: 28px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .auth-subtitle { color: #94a3b8; margin-bottom: 25px; font-size: 15px; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #475569; background: rgba(0,0,0,0.5); color: white; box-sizing: border-box; font-size: 14px; transition: 0.2s; font-family: inherit; }
        .auth-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .name-row { display: flex; gap: 10px; }
        .btn { width: 100%; padding: 14px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; border: none; font-family: inherit; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-google { background: white; color: #334155; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background: #f8fafc; }
        .auth-link { color: #3b82f6; cursor: pointer; font-size: 14px; text-decoration: none; display: block; margin-top: 15px; background: none; border: none; width: 100%; font-family: inherit; }
        .auth-link:hover { color: white; text-shadow: 0 0 5px #3b82f6; }
        .error-msg { color: #ef4444; font-size: 13px; margin-bottom: 15px; display: none; }
        .divider { margin: 25px 0; color: #64748b; font-size: 14px; font-weight: bold; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid #334155; margin: 0 10px; }
    </style>
    <script type="module" src="js/maintenance.js"></script>

</head>
<body>

    <div class="auth-container">
        <div id="standard-auth-wrap">
            <h1>LOGIC LORDS</h1>
            <p id="auth-subtitle" class="auth-subtitle">Please login to your account</p>
            <p id="auth-error" class="error-msg">Error message goes here.</p>

            <div id="view-login">
                <input type="text" id="login-identifier" class="auth-input" placeholder="Email Address or Username">
                <input type="password" id="login-password" class="auth-input" placeholder="Password">
                <button class="btn btn-primary" onclick="loginWithEmail()">Login</button>
                <button class="auth-link" onclick="alert('Forgot Password coming soon!')">Forgot Password?</button>
                <button class="auth-link" onclick="toggleView('register')">Need an account? Register here</button>
            </div>

            <div id="view-register" style="display: none;">
                <div class="name-row">
                    <input type="text" id="reg-fname" class="auth-input" placeholder="First Name">
                    <input type="text" id="reg-lname" class="auth-input" placeholder="Last Name">
                </div>
                <input type="text" id="reg-username" class="auth-input" placeholder="Username (e.g. LogicMaster99)">
                <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
                <input type="password" id="reg-password" class="auth-input" placeholder="Password">
                <input type="password" id="reg-confirm" class="auth-input" placeholder="Confirm Password">
                
                <div style="text-align: left; margin-bottom: 5px; color: #94a3b8; font-size: 12px; margin-left: 5px;">Birthdate (Optional)</div>
                <input type="date" id="reg-birthdate" class="auth-input" style="color: #94a3b8;">
                
                <button class="btn btn-primary" onclick="registerWithEmail()">Register</button>
                <button class="auth-link" onclick="toggleView('login')">Already have an account? Back to Login</button>
            </div>

            <div class="divider">OR</div>
            <button class="btn btn-google" onclick="loginWithGoogle()"><img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo" width="20" height="20">Sign in with Google</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
            
        const firebaseConfig = { apiKey: "AIzaSyBaNWmSxGWq3q3G7qm78Aj-npdGTaAy3tM", authDomain: "logiclords-mvp.firebaseapp.com", projectId: "logiclords-mvp" };
        
        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp(); 
        const db = getFirestore(app); const auth = getAuth(app); const provider = new GoogleAuthProvider();
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'register') toggleView('register');

        function routeToApp(uid) { 
            localStorage.setItem('logicLordsUserId', uid); // Inject ID for immediate Engine use!
            window.location.href = 'app.html'; 
        }

        function toggleView(mode) {
            document.getElementById('auth-error').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('view-login').style.display = 'none';
                document.getElementById('view-register').style.display = 'block';
                document.getElementById('auth-subtitle').innerText = "Register your account";
            } else {
                document.getElementById('view-register').style.display = 'none';
                document.getElementById('view-login').style.display = 'block';
                document.getElementById('auth-subtitle').innerText = "Please login to your account";
            }
        }

        function showError(msg) { document.getElementById('auth-error').innerText = msg; document.getElementById('auth-error').style.display = 'block'; }

        async function loginWithEmail() {
            const identifier = document.getElementById('login-identifier').value.trim();
            const pass = document.getElementById('login-password').value;
            if (!identifier || !pass) return showError("Please fill in all fields.");

            let loginEmail = identifier;
            try {
                if (!identifier.includes('@')) {
                    const usersRef = collection(db, "users");
                    const q = query(usersRef, where("username", "==", identifier));
                    const querySnapshot = await getDocs(q);
                    if (querySnapshot.empty) return showError("Username not found.");
                    loginEmail = querySnapshot.docs[0].data().email;
                }
                const cred = await signInWithEmailAndPassword(auth, loginEmail, pass);
                routeToApp(cred.user.uid); 
            } catch (error) { showError(error.message.replace("Firebase: ", "")); }
        }

        async function registerWithEmail() {
            const fname = document.getElementById('reg-fname').value.trim();
            const lname = document.getElementById('reg-lname').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!fname || !lname || !username || !email || !pass) return showError("Please fill in all required fields.");
            if (pass !== confirm) return showError("Passwords do not match.");

            try {
                const usernameCheck = await getDocs(query(collection(db, "users"), where("username", "==", username)));
                if (!usernameCheck.empty) return showError("Username is already taken.");

                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCredential.user, { displayName: username });
                
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    firstName: fname, lastName: lname, username: username, email: email,
                    economy: { gold: 1000, global_xp: 0, streak: 0 }, curriculums: {}, 
                    inventory: { stories: ["season_1"], badges: ["badge_pioneer"], banners: ["default"], mapThemes: ["theme-standard", "theme-hex"] },
                    equipped: { mapTheme: "theme-standard", banner: "default", badges: ["badge_pioneer"] } 
                });
                
                routeToApp(userCredential.user.uid);
            } catch (error) { showError(error.message.replace("Firebase: ", "")); }
        }

        async function loginWithGoogle() { 
            try { 
                const result = await signInWithPopup(auth, provider); 
                const userRef = doc(db, "users", result.user.uid);
                const docSnap = await getDoc(userRef);
                
                if (!docSnap.exists()) {
                    await setDoc(userRef, { 
                        firstName: result.user.displayName.split(" ")[0], lastName: result.user.displayName.split(" ")[1] || "", 
                        username: result.user.displayName.replace(/\s+/g, ''), email: result.user.email,
                        economy: { gold: 1000, global_xp: 0, streak: 0 }, curriculums: {}, 
                        inventory: { stories: ["season_1"], badges: ["badge_pioneer"], banners: ["default"], mapThemes: ["theme-standard", "theme-hex"] },
                        equipped: { mapTheme: "theme-standard", banner: "default", badges: ["badge_pioneer"] }
                    });
                }
                routeToApp(result.user.uid); 
            } catch (error) { showError("Google Sign-In Failed."); } 
        }

        window.toggleView = toggleView; window.loginWithEmail = loginWithEmail; window.registerWithEmail = registerWithEmail; window.loginWithGoogle = loginWithGoogle;
    </script>
</body>
</html>
