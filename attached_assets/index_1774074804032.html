<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logic Lords - Welcome</title>
    <meta name="google-site-verification" content="pFoikgN-hNA_DnmUuiDgTQlUibr99z1ODPXPJutNorI" />
    <link rel="stylesheet" href="global.css">
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        .hero-container { max-width: 800px; padding: 40px; }
        .hero-icon { font-size: 80px; margin-bottom: 20px; text-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
        h1 { font-size: 56px; margin: 0; text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); letter-spacing: 2px; }
        p { color: #cbd5e1; font-size: 20px; line-height: 1.6; margin: 20px auto 40px auto; }
        .btn-group { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .btn { padding: 15px 40px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; border: 2px solid #3b82f6; transition: 0.2s; background: transparent; color: white; text-decoration: none; }
        .btn:hover { background: rgba(59, 130, 246, 0.1); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); transform: translateY(-3px); }
        .btn-primary { background: #3b82f6; }
        .btn-primary:hover { background: #2563eb; }
    </style>
    <script type="module" src="js/maintenance.js"></script>
</head>
<body>
    <div class="hero-container">
        <div class="hero-icon">🌌</div>
        <h1>ENTER THE ECOSYSTEM</h1>
        <p>Welcome to Logic Lords. Here, standard curriculums are transformed into living, breathing worlds. Your knowledge is your currency, and mastery is the only way forward.</p>
        
        <div class="btn-group">
            <a href="auth.html?mode=login" class="btn">LOG IN</a>
            <a href="auth.html?mode=register" class="btn btn-primary">SIGN UP / REGISTER 🡢</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBaNWmSxGWq3q3G7qm78Aj-npdGTaAy3tM", authDomain: "logiclords-mvp.firebaseapp.com", projectId: "logiclords-mvp" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Clean slate on logout!
        if (window.location.hash === '#logout') {
            signOut(auth);
            localStorage.clear(); 
            history.replaceState(null, null, ' '); 
        }

        // Auto-redirect if already logged in!
        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                window.location.href = 'app.html'; 
            }
        });
    </script>
</body>
</html>
