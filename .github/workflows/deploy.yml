name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install Dependencies (no frozen lockfile)
        run: pnpm install --no-frozen-lockfile

      - name: Build Web App
        run: pnpm --filter @workspace/web-app run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_OCR_SERVER_URL: ${{ secrets.VITE_OCR_SERVER_URL }}

      - name: Set up SPA routing for GitHub Pages
        run: |
          touch ./artifacts/web-app/dist/.nojekyll
          # Write a 404.html that redirects to root while preserving the path
          cat > ./artifacts/web-app/dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Logic Lords</title>
              <script>
                // GitHub Pages SPA redirect: encode current path in query string
                var l = window.location;
                l.replace(
                  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                  l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=' +
                  l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
                  (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                  l.hash
                );
              </script>
            </head>
          </html>
          EOF
          # Inject the path-restore script into index.html
          RESTORE_SCRIPT='<script>(function(l){if(l.search[1]==="/"+"p"){var d=l.search.slice(1).split("&").map(function(v){return v.replace(/~and~/g,"&")});window.history.replaceState(null,null,l.pathname.slice(0,-1)+d[0].slice(1)+(d[1]?"?"+d[1]:"")+l.hash)}else if(l.search[1]==="q"){var d=l.search.slice(2).split("&").map(function(v){return v.replace(/~and~/g,"&")});window.history.replaceState(null,null,l.pathname+(d[0]?"?"+d[0]:"")+l.hash)}}(window.location));<\/script>'
          sed -i "s|</head>|${RESTORE_SCRIPT}</head>|" ./artifacts/web-app/dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: './artifacts/web-app/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
