name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install Dependencies (no frozen lockfile)
        run: pnpm install --no-frozen-lockfile

      - name: Build Web App
        run: pnpm --filter @workspace/web-app run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_OCR_SERVER_URL: ${{ secrets.VITE_OCR_SERVER_URL }}

      - name: Set up SPA routing for GitHub Pages
        run: |
          touch ./artifacts/web-app/dist/.nojekyll
          python3 - << 'PYEOF'
          import pathlib, textwrap

          dist = pathlib.Path("./artifacts/web-app/dist")

          # ── 404.html ── redirect to root, encoding the path as ?p=...
          four_oh_four = textwrap.dedent("""\
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Logic Lords</title>
              <script>
                var l = window.location;
                var seg = l.pathname.split('/');
                var base = seg.slice(0, 2).join('/');
                var rest = seg.slice(2).join('/').replace(/&/g, '~and~');
                var qs = l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '';
                l.replace(l.protocol + '//' + l.host + base + '/?p=' + rest + qs + l.hash);
              </script>
            </head>
          </html>
          """)
          (dist / "404.html").write_text(four_oh_four, encoding="utf-8")

          # ── index.html ── inject path-restore script before </head>
          restore = (
            '<script>'
            '(function(l){'
              'var s=l.search;'
              'if(s[1]==="p"){'
                'var d=s.slice(1).split("&").map(function(v){return v.replace(/~and~/g,"&")});'
                'window.history.replaceState(null,null,l.pathname.replace(/\\/$/,"")+(d[0]?"/"+d[0].slice(d[0].indexOf("=")+1):"")+(d[1]?"?"+d[1]:"")+l.hash);'
              '}'
            '}(window.location));'
            '</script>'
          )
          idx = dist / "index.html"
          html = idx.read_text(encoding="utf-8")
          html = html.replace("</head>", restore + "</head>", 1)
          idx.write_text(html, encoding="utf-8")

          print("SPA routing files written successfully.")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: './artifacts/web-app/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
