name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web App
        run: pnpm --filter @workspace/web-app run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Copy index to 404 for SPA routing
        run: cp ./artifacts/web-app/dist/index.html ./artifacts/web-app/dist/404.html

      - name: Add deep-link route fallbacks
        run: |
          mkdir -p ./artifacts/web-app/dist/app ./artifacts/web-app/dist/auth ./artifacts/web-app/dist/dashboard ./artifacts/web-app/dist/superadmin
          cp ./artifacts/web-app/dist/index.html ./artifacts/web-app/dist/app/index.html
          cp ./artifacts/web-app/dist/index.html ./artifacts/web-app/dist/auth/index.html
          cp ./artifacts/web-app/dist/index.html ./artifacts/web-app/dist/dashboard/index.html
          cp ./artifacts/web-app/dist/index.html ./artifacts/web-app/dist/superadmin/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/web-app/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
